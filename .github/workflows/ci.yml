name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod tidy
      - run: git diff --exit-code -- go.mod go.sum
      - run: go vet ./...
      - run: go test ./...

